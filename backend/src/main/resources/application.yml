server:
  port: 8080

spring:
  application:
    name: instamvp-backend

  datasource:
    url: jdbc:h2:file:./data/instamvp;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.instamvp: INFO

scraper:
  # Seed inicial da watchlist na primeira subida (só roda 1x; perfis que não
  # existirem ou estiverem privados ficam marcados como tal, sem quebrar o worker).
  default-usernames: nike,adidas,puma,underarmour,reebok,newbalance,asics,fila,vans,converse,lululemon,gymshark,decathlon,umbro,kappa,mizunousa,brooksrunning,hokaoneone,onrunning,salomon,columbia1938,thenorthface,patagonia,wilson,spalding,diadora,lacoste,kswiss,saucony,skechers,nikefootball,nikerunning,nikebasketball,adidasoriginals,adidasfootball,championusa,speedo,oakley,specialized,trekbikes,garmin,peloton,crossfit,gatorade,castelli_cycling
  worker:
    enabled: true
    interval-ms: 300000 # 5 minutos entre ciclos de verificação da watchlist
    delay-between-profiles-min-ms: 8000  # cadência mínima entre um perfil e outro (anti-bot)
    delay-between-profiles-max-ms: 20000 # cadência máxima (o valor real é aleatório nesse intervalo)
